<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | Mental Stress Detection Login</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.75);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Trebuchet MS', sans-serif; }

        /* Local icon shim */
        .fas { display: inline-flex; align-items: center; justify-content: center; font-style: normal; line-height: 1; }
        .fa-arrow-left::before { content: "\2190"; }
        .fa-microchip::before { content: "\2699"; }
        .fa-user-circle::before { content: "\1F464"; }
        .fa-envelope::before { content: "\2709"; }
        .fa-lock::before { content: "\1F512"; }
        .fa-key::before { content: "\1F5DD"; }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 18px;
        }

        /* Biometric Background Effect */
        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            animation: move 15s infinite alternate;
            pointer-events: none;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 28px;
            border: 1px solid var(--card-border);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-section { text-align: center; margin-bottom: 2rem; }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .logo i { color: var(--primary); }
        .logo span { background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .header-section h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header-section p { color: #94a3b8; font-size: 0.9rem; }

        /* Notification Box */
        .msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
            border: 1px solid transparent;
        }
        .msg.success { background: rgba(16, 185, 129, 0.1); color: #6ee7b7; border-color: rgba(16, 185, 129, 0.2); }
        .msg.error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border-color: rgba(239, 68, 68, 0.2); }

        .input-group { margin-bottom: 1rem; }
        .input-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 16px; color: #64748b; font-size: 1rem; }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.98rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
        .btn-auth:disabled { opacity: 0.7; cursor: not-allowed; }

        .toggle-text { text-align: center; margin-top: 1.5rem; color: #94a3b8; font-size: 0.9rem; }
        .toggle-text span { color: var(--primary); font-weight: 700; cursor: pointer; }

        .back-home {
            position: fixed;
            top: 22px;
            left: 22px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="blob"></div>

<a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Site</a>

<div class="auth-card">
    <div class="header-section">
        <div class="logo"> Mental Stress Detection Using Voice Tone Analysis</div>
        <h2 id="auth-title">Patient Login</h2>
        <p id="auth-desc">Secure access to clinical diagnostics</p>
    </div>

    <div id="msg-box" class="msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label>Registered Email</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="name@hospital.com" required>
            </div>
        </div>
        <div class="input-group">
            <label>Security Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="********" required>
            </div>
        </div>
        <button type="submit" class="btn-auth">Authorize Entry</button>
    </form>

    <div id="register-flow" style="display: none;">
        
        <form id="reg-step-1" onsubmit="sendOTP(event)">
            <div class="input-group">
                <label>Full Patient Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="regName" placeholder="Enter full name" required>
                </div>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="name@hospital.com" required>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="btn-step-1">Send Verification Code</button>
        </form>

        <form id="reg-step-2" onsubmit="verifyOTP(event)" style="display: none;">
            <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px; text-align: center;">We sent a 6-digit code to your email.</p>
            <div class="input-group">
                <label>6-Digit Code</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="text" id="regOTP" placeholder="123456" required autocomplete="off">
                </div>
            </div>
            <button type="submit" class="btn-auth" id="btn-step-2">Verify Code</button>
        </form>

        <form id="reg-step-3" onsubmit="completeRegistration(event)" style="display: none;">
            <div class="input-group">
                <label>Create Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPass" placeholder="********" required>
                </div>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassConfirm" placeholder="********" required>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="btn-step-3">Complete Registration</button>
        </form>

    </div>

    <div class="toggle-text">
        <p id="toggle-p">New patient? <span onclick="toggleMode()">Create Digital Record</span></p>
    </div>
</div>

<script>
    let isLoginMode = true;
    
    // Variables to hold registration data between steps
    let tempRegName = "";
    let tempRegEmail = "";

    function showMessage(text, isError = false) {
        const msgBox = document.getElementById('msg-box');
        msgBox.innerText = text;
        msgBox.className = isError ? "msg error" : "msg success";
        msgBox.style.display = "block";
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? 'Patient Login' : 'Register Record';
        document.getElementById('auth-desc').innerText = isLoginMode ? 'Secure access to clinical diagnostics' : 'Create your patient record securely';
        
        // Toggle the forms
        document.getElementById('login-form').style.display = isLoginMode ? 'block' : 'none';
        document.getElementById('register-flow').style.display = isLoginMode ? 'none' : 'block';
        
        // Reset registration flow if switching modes
        document.getElementById('reg-step-1').style.display = 'block';
        document.getElementById('reg-step-2').style.display = 'none';
        document.getElementById('reg-step-3').style.display = 'none';

        document.getElementById('toggle-p').innerHTML = isLoginMode
            ? 'New patient? <span onclick="toggleMode()">Create Digital Record</span>'
            : 'Already registered? <span onclick="toggleMode()">Authorize Login</span>';
        
        document.getElementById('msg-box').style.display = 'none';
    }

    // --- 1. LOGIN LOGIC ---
    function handleLogin(e) {
        e.preventDefault(); 
        const email = document.getElementById('loginEmail').value;
        
        showMessage("Identity Verified. Accessing Dashboard...", false);

        // Standard Login Mockup (Update this with a fetch() to your backend later if needed)
        sessionStorage.setItem('activeUser', email);
        sessionStorage.setItem('userName', email.split('@')[0]);

        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 800);
    }

    // --- 2. REGISTRATION FLOW: STEP 1 (Send OTP) ---
    async function sendOTP(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-step-1');
        tempRegName = document.getElementById('regName').value;
        tempRegEmail = document.getElementById('regEmail').value;

        btn.innerText = "Sending...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/send_signup_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: tempRegEmail })
            });
            const data = await response.json();

            if (data.status === 'success') {
                document.getElementById('reg-step-1').style.display = 'none';
                document.getElementById('reg-step-2').style.display = 'block';
                document.getElementById('msg-box').style.display = 'none';
            } else {
                showMessage(data.message || "Failed to send OTP.", true);
            }
        } catch (error) {
            console.error(error);
            showMessage("Server error. Ensure backend is running.", true);
        } finally {
            btn.innerText = "Send Verification Code";
            btn.disabled = false;
        }
    }

    // --- 3. REGISTRATION FLOW: STEP 2 (Verify OTP) ---
    async function verifyOTP(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-step-2');
        const otp = document.getElementById('regOTP').value;

        btn.innerText = "Verifying...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/verify_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: tempRegEmail, otp: otp })
            });
            const data = await response.json();

            if (data.status === 'success') {
                document.getElementById('reg-step-2').style.display = 'none';
                document.getElementById('reg-step-3').style.display = 'block';
                document.getElementById('msg-box').style.display = 'none';
            } else {
                showMessage("Invalid Verification Code.", true);
            }
        } catch (error) {
            console.error(error);
            showMessage("Server error during verification.", true);
        } finally {
            btn.innerText = "Verify Code";
            btn.disabled = false;
        }
    }

    // --- 4. REGISTRATION FLOW: STEP 3 (Complete Registration) ---
    async function completeRegistration(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-step-3');
        const pass = document.getElementById('regPass').value;
        const confirmPass = document.getElementById('regPassConfirm').value;

        if (pass !== confirmPass) {
            showMessage("Passwords do not match!", true);
            return;
        }

        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/register_final', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name: tempRegName, 
                    email: tempRegEmail, 
                    password: pass 
                })
            });
            const data = await response.json();

            if (data.status === 'success') {
                showMessage("Account created! Redirecting to login...", false);
                setTimeout(() => {
                    window.location.reload(); // Reloads to show clean login screen
                }, 1500);
            } else {
                showMessage(data.message || "Failed to create account.", true);
            }
        } catch (error) {
            console.error(error);
            showMessage("Server error during registration.", true);
        } finally {
            btn.innerText = "Complete Registration";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
